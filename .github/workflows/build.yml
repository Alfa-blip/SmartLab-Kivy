name: Build Kivy APK (Fixed)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout kode
      uses: actions/checkout@v4

    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip libssl-dev libffi-dev \
        libltdl-dev python3-dev openjdk-17-jdk ccache autoconf libtool pkg-config

    - name: Install Buildozer & Cython Baru
      run: |
        python -m pip install --upgrade pip
        pip install "buildozer==1.5.0" "Cython<3.0" virtualenv

    - name: Build APK via Buildozer
      run: |
        # Buat folder .buildozer terlebih dahulu agar tidak memicu error permission
        mkdir -p .buildozer
        yes | buildozer android debug

    - name: Upload APK Hasil (Toleran Jika Gagal)
      uses: actions/upload-artifact@v4
      with:
        name: SmartLab-APK
        path: |
          bin/*.apk
          .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/**/build/outputs/apk/**/*.apk
