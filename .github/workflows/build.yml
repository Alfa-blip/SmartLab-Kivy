name: Build Kivy APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout kode
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip libssl-dev libffi-dev \
        libltdl-dev python3-dev openjdk-17-jdk

    - name: Install Buildozer & Cython
      run: |
        python -m pip install --upgrade pip
        pip install buildozer "Cython<3.0" virtualenv

    - name: Build APK dengan Buildozer
      run: |
        yes | buildozer android debug

    - name: Upload APK Hasil
      uses: actions/upload-artifact@v4
      with:
        name: SmartLab-APK
        path: bin/*.apk
